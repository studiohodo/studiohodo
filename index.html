<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>studio hodo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="favicon.svg" type="image/svg+xml">

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="system.css" />
  </head>

  <body>
    <!-- header -->

    <header class="header pt-3 pb-6">
      <div class="px-2">
          <img src="/logo_small.svg">
          <p class="pt-2">소란스러운 수식보다 대상이 가진 고유한 온도를 믿습니다.</p>
        </div>
          <div>

        </div>
        </div>

      
    </header>



    <main>
      <div class="container">
        <!-- 1. 메인 이미지 -->

        <section class="px-2 pb-8">
          <div class="full-width">
            <div class="no-overlay-thumb">
              <img
                src="img/pic_1_1.jpg"
                alt="Full width 이미지"
                loading="lazy"
              />
            </div>
          </div>
        </section>

        <!-- 2. 서비스 섹션 -->

        <section class="px-2 pb-6">
          <div class="grid-service">
            <div class="pb-2">
              <span class="under-line">
              <h3 class="under-line pb-05">서비스</h3>
            </div>
          </div>

          <div class="grid-service">
            <div>
              <p class="pb-1"><h4 class="pb-1">프로필 촬영</h4></p>
              <div class="box-h-8">
                <p class="mr-2 pl-1">
                  아이들의 모습을 기록합니다.<br />
                  따뜻한 빛 아래에서 아이 본연의 미소를 담아냅니다.
                </p>
              </div>
              <div class="no-overlay-thumb m-mx-300">
                <img src="img/pic_2.jpg" />
              </div>
            </div>

            <div>
              <p class="pb-1"><h4 class="pb-1">브랜드</h4></p>
              <div class="box-h-8">
                <p class="mr-2 pl-1">
                  브랜드의 이야기를 시각화합니다.<br />
                  브랜드의 이야기로 시작되는 새로운 가능성을 함께 열어냅니다.
                </p>
              </div>
              <div class="no-overlay-thumb m-mx-300">
                <img src="img/pic_6.jpg" />
              </div>
            </div>

            <div>
              <p class="pb-1"><h4 class="pb-1">커스텀 프로젝트</h4></p>
              <div class="box-h-8">
                <p class="mr-2 pl-1">
                  특별한 아이디어를 함께 실현합니다.<br />
                  호도의 공간에서 당신의 이야기를 전해주세요.
                </p>
              </div>
              <div class="no-overlay-thumb m-mx-300">
                <img src="img/pic_13.jpg" />
              </div>
            </div>
          </div>
        </section>

        <!-- 3. gallery -->
        <hr class="m-2" />

        <section>
          <div class="grid-gallery px-2 pt-8 pb-6">
            <div class="a-c">
              <div>
                <p class="a-c mr-2">photo by</p>
                <img src="logo_small.svg" class="logo mr-2 m-1" />
              </div>
            </div>
            <div>
              <div class="thumb">
                <img src="img/pic_5.jpg" />
              </div>
            </div>
            <div>
              <div class="thumb">
                <img src="img/pic_4.jpg" />
              </div>
            </div>
            <div>
              <div class="thumb">
                <img src="img/pic_3.jpg" />
              </div>
            </div>
            <div>
              <div class="thumb">
                <img src="img/pic_7.jpg" />
              </div>
            </div>
            <div></div>
          </div>
        </section>
      </div>
    </main>

    <hr class="m-2" />
    <section>
      <div class="grid-thumb-gallery px-2 pt-2">
        <div class="thumb">
          <img src="img/pic_8.jpg" />
        </div>
        <div class="thumb">
          <img src="img/pic_9.jpg" />
        </div>
        <div class="thumb">
          <img src="img/pic_10.jpg" />
        </div>
        <div class="thumb">
          <img src="img/pic_17.jpg" />
        </div>
        <div class="thumb">
          <img src="img/pic_18.jpg" />
        </div>
        <div class="thumb">
          <img src="img/pic_14.jpg" />
        </div>
        <div class="thumb">
          <img src="img/pic_15.jpg" />
        </div>
        <div class="thumb">
          <img src="img/pic_16.jpg" />
        </div>
      </div>
    </section>

    <!-- 4. footer -->
    <footer class="px-2 pt-8 pb-4">
      <div>
        <img src="logo_small.svg" />
      </div>
      <div class="pt-2">
        <p>studio hodo, 스튜디오 호도<br />general@studiohodo.com</p>
      </div>
      <div class="pt-1">
        <p>05805, 서울 송파구 동남로4길 16-1 2층</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
